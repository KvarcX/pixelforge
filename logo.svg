<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4D9EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2B4A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pixel grid / anvil shape -->
  <g transform="translate(20, 20)">
    <!-- Anvil top (wide) -->
    <rect x="10" y="10" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="30" y="10" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="50" y="10" width="16" height="16" rx="2" fill="#4D9EFF"/>
    <rect x="70" y="10" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="90" y="10" width="16" height="16" rx="2" fill="#1A2B4A"/>

    <!-- Anvil middle rows -->
    <rect x="20" y="30" width="16" height="16" rx="2" fill="#4D9EFF"/>
    <rect x="40" y="30" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="60" y="30" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="80" y="30" width="16" height="16" rx="2" fill="#4D9EFF"/>

    <!-- Anvil narrow body -->
    <rect x="30" y="50" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="50" y="50" width="16" height="16" rx="2" fill="#4D9EFF"/>
    <rect x="70" y="50" width="16" height="16" rx="2" fill="#1A2B4A"/>

    <!-- Anvil base (wide) -->
    <rect x="10" y="70" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="30" y="70" width="16" height="16" rx="2" fill="#4D9EFF"/>
    <rect x="50" y="70" width="16" height="16" rx="2" fill="#1A2B4A"/>
    <rect x="70" y="70" width="16" height="16" rx="2" fill="#4D9EFF"/>
    <rect x="90" y="70" width="16" height="16" rx="2" fill="#1A2B4A"/>

    <!-- Sparks (code symbols as pixels) -->
    <text x="108" y="18" font-family="monospace" font-size="14" fill="#4D9EFF" font-weight="bold">&lt;/&gt;</text>
    <rect x="2" y="2" width="8" height="8" rx="1" fill="#4D9EFF" opacity="0.6"/>
    <rect x="110" y="40" width="6" height="6" rx="1" fill="#4D9EFF" opacity="0.4"/>
    <rect x="0" y="45" width="6" height="6" rx="1" fill="#1A2B4A" opacity="0.5"/>
  </g>

  <!-- Brand name -->
  <text x="160" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="42" fill="#1A2B4A">
    <tspan font-weight="300">Pixel</tspan><tspan font-weight="700">Forge</tspan>
  </text>

  <!-- Tagline -->
  <text x="160" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4D9EFF" letter-spacing="2">
    DIGITAL CRAFT STUDIO
  </text>

  <!-- Divider line -->
  <line x1="160" y1="95" x2="380" y2="95" stroke="#4D9EFF" stroke-width="1" opacity="0.4"/>

  <!-- Slogan -->
  <text x="160" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#1A2B4A" font-style="italic" opacity="0.7">
    Каждый пиксель работает на вас
  </text>
</svg>
