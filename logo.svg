<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="boostGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Лабораторная колба с восходящим графиком -->
  <g transform="translate(20, 20)">
    <!-- Горлышко колбы -->
    <rect x="52" y="8" width="16" height="18" rx="2" fill="none" stroke="#7C3AED" stroke-width="3"/>
    <!-- Корпус колбы (трапеция) -->
    <path d="M 44 26 L 76 26 L 100 94 L 20 94 Z" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linejoin="round"/>
    <!-- Деления шкалы на колбе -->
    <line x1="30" y1="82" x2="36" y2="82" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="72" x2="38" y2="72" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    <line x1="32" y1="62" x2="40" y2="62" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    <line x1="34" y1="52" x2="42" y2="52" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>
    <line x1="36" y1="42" x2="44" y2="42" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>

    <!-- Жидкость-график: столбики растущей высоты внутри колбы -->
    <rect x="28" y="82" width="10" height="10" rx="1" fill="#10B981" opacity="0.85"/>
    <rect x="42" y="72" width="10" height="20" rx="1" fill="#10B981" opacity="0.9"/>
    <rect x="56" y="60" width="10" height="32" rx="1" fill="#10B981" opacity="0.95"/>
    <rect x="70" y="44" width="10" height="48" rx="1" fill="#10B981"/>

    <!-- Восходящая стрелка-трендовая линия, выходящая из колбы вверх -->
    <polyline points="24,86 42,76 58,64 76,50 90,38 104,18"
              fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="104,18 96,20 100,28" fill="#10B981"/>

    <!-- "Искры эксперимента" — малые точки-маркеры данных -->
    <circle cx="42" cy="76" r="2.5" fill="#7C3AED"/>
    <circle cx="58" cy="64" r="2.5" fill="#7C3AED"/>
    <circle cx="76" cy="50" r="2.5" fill="#7C3AED"/>
    <circle cx="90" cy="38" r="2.5" fill="#7C3AED"/>

    <!-- Символы данных { } — ассоциация с кодом/JSON -->
    <text x="108" y="92" font-family="monospace" font-size="14" fill="#7C3AED" font-weight="bold">{ }</text>
    <rect x="0" y="4" width="5" height="5" rx="1" fill="#10B981" opacity="0.5"/>
    <rect x="112" y="36" width="4" height="4" rx="1" fill="#7C3AED" opacity="0.4"/>
  </g>

  <!-- Название бренда -->
  <text x="160" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="42" fill="#0F172A">
    <tspan font-weight="700">Boost</tspan><tspan font-weight="300" fill="#7C3AED">Lab</tspan>
  </text>

  <!-- Подпись-позиционирование -->
  <text x="160" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#10B981" letter-spacing="2">
    GROWTH LAB STUDIO
  </text>

  <!-- Разделительная линия -->
  <line x1="160" y1="95" x2="380" y2="95" stroke="#10B981" stroke-width="1" opacity="0.45"/>

  <!-- Слоган -->
  <text x="160" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#0F172A" font-style="italic" opacity="0.75">
    Каждая метрика работает на вас
  </text>
</svg>
